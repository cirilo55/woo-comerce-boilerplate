<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <!-- Amazon dark -->
    <linearGradient id="darkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#232F3E"></stop>
      <stop offset="100%" stop-color="#0F1111"></stop>
    </linearGradient>

    <!-- Amazon orange -->
    <linearGradient id="amazonOrange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF9900"></stop>
      <stop offset="100%" stop-color="#FFB84D"></stop>
    </linearGradient>

  </defs>

  <!-- A shape -->
  <polygon points="128,20 70,180 100,180 128,100 156,180 186,180" fill="url(#darkGrad)"></polygon>

  <!-- Orange side -->
  <polygon points="128,20 156,180 186,180 156,70" fill="url(#amazonOrange)"></polygon>

  <!-- Smile -->
  <path d="M60 195 Q128 230 196 195" stroke="#FF9900" stroke-width="10" fill="none" stroke-linecap="round"></path>

</svg>